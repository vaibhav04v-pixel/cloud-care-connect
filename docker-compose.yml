version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=hospital_management
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=hospital_management
      - JWT_SECRET=dev_secret_key_change_in_production
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    # Mount volume for hot reload in development
    volumes:
      - ./frontend/src:/app/src
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
